{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ERP Ecopremium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* Reset Geral com Tipografia Premium */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      /* Imagem de fundo premium com sobreposição azul escuro */
      background-image: linear-gradient(rgba(13, 33, 73, 0.85), rgba(10, 15, 30, 0.95)),
                        url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1920');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-wrapper {
      width: 100%;
      max-width: 440px;
    }

    /* Card de Login Estilo Light/Premium */
    .login-card {
      background-color: #ffffff;
      padding: 45px 40px;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      border-top: 5px solid #C5A059; /* Detalhe em dourado no topo */
    }

    /* Cabeçalho do Bloco */
    .login-header {
      text-align: center;
      margin-bottom: 35px;
    }

    .login-logo-container {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0D2149;
      border: 2px solid #C5A059;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(13, 33, 73, 0.15);
    }

    .login-logo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .login-brand {
      font-size: 24px;
      font-weight: 700;
      color: #0D2149;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .login-brand span {
      color: #C5A059; /* Dourado Premium */
      font-weight: 400;
    }

    .login-subtitle {
      color: #718096;
      font-size: 13px;
      margin-top: 8px;
      letter-spacing: 0.5px;
      font-weight: 500;
      line-height: 1.4;
    }

    /* Formulários e Inputs */
    .login-form .form-group {
      margin-bottom: 22px;
    }

    .login-form .form-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #0D2149;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .login-form .form-label svg {
      width: 14px;
      height: 14px;
      color: #718096;
    }

    .login-form .form-control {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #E2E8F0;
      border-radius: 6px;
      font-size: 15px;
      color: #2D3748;
      background-color: #F8FAFC;
      transition: all 0.3s ease;
    }

    /* Efeito de Focus Premium */
    .login-form .form-control:focus {
      outline: none;
      border-color: #C5A059;
      background-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.15);
    }

    /* Botão Principal Estilo Azul/Dourado no Hover */
    .btn-login {
      width: 100%;
      padding: 15px;
      background-color: #0D2149;
      border: 1px solid #0D2149;
      border-radius: 6px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(13, 33, 73, 0.2);
      margin-top: 10px;
    }

    .btn-login:hover {
      background-color: #C5A059;
      border-color: #C5A059;
      box-shadow: 0 4px 12px rgba(197, 160, 89, 0.3);
      transform: translateY(-1px);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* Alert de Erro Customizado para o Light Theme */
    .alert-login {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px;
      background: #FEF2F2;
      border: 1px solid #FCA5A5;
      border-radius: 6px;
      color: #991B1B;
      font-size: 13px;
      margin-bottom: 24px;
      font-weight: 500;
    }

    .alert-login svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      color: #DC2626;
    }

    /* Rodapé Corporativo */
    .marcas-footer {
      text-align: center;
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      border-top: 1px solid #EDF2F7;
      padding-top: 20px;
    }

    .marca-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #718096;
      padding: 5px 12px;
      border: 1px solid #E2E8F0;
      border-radius: 4px;
      background: #F8FAFC;
    }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">

    <div class="login-header">
      <div class="login-logo-container">
        <img src="{% static 'assets/logo.png' %}" alt="Ecopremium"
             onerror="this.parentElement.textContent='🌿'">
      </div>
      <div class="login-brand">Eco<span>premium</span></div>
      <p class="login-subtitle">Gestão integrada de processos operacionais e administrativos</p>
    </div>

    {% if messages %}
    {% for message in messages %}
    <div class="alert-login">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
      </svg>
      <span>{{ message }}</span>
    </div>
    {% endfor %}
    {% endif %}

    <form class="login-form" method="post" id="loginForm">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="username">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
          </svg>
          Usuário
        </label>
        <input type="text" id="username" name="username" class="form-control"
               placeholder="Digite seu usuário" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
          </svg>
          Senha
        </label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login">
        Entrar no Sistema
      </button>
    </form>

    <div class="marcas-footer">
      <span class="marca-tag">Trip Premium</span>
      <span class="marca-tag">Eco Premium</span>
      <span class="marca-tag">Log Premium</span>
    </div>
  </div>
</div>

</body>
</html>
